  <script type="text/markdown" id="skill-md-analyze-data">---
name: analyze-data
description: Use this skill when the user asks to query data, get specific numbers, answer factual questions, analyze data, find trends, explore a dataset, or visualize results.
metadata:
  builtin: "true"
---

## What this skill does

Turns a question into an answer grounded in the project's data. It picks the right models, runs the right cuts, and — when a visual makes the answer easier to read — produces a chart with a one-sentence takeaway.

This is the workhorse skill for analytical conversations: the user asks a question, the agent figures out the relevant tables, the answer lands with the supporting numbers and (where helpful) a chart that explains the trend at a glance.

## When to use

- The user asks a quantitative question ("how many", "what's the average", "which is highest").
- The user wants to find a trend, compare cohorts, or look at a distribution.
- The user wants to visualize a result ("chart this", "show me as a bar chart").
- The user is exploring a dataset and isn't sure yet what to ask.
- The user wants a follow-up cut on a previous answer ("now break that down by region").

## What you get back

- **A direct answer to the question** — usually a number, a small table, or a short ranked list.
- **A chart, when the result calls for one.** Line for trends over time, bar for category comparisons, scatter for relationships, area for stacked composition.
- **A one-sentence takeaway** that names the leader, the trend, or the outlier — so the chart isn't just decoration.
- **Follow-up suggestions** that turn one question into a thread of analysis, not a one-shot lookup.

## Where it stops

It won't fabricate data when the question can't be answered from the connected models — it'll say so and suggest what would be needed. It also won't write essays; if the user wants a polished narrative report, that's the **generate-report** skill.

## What you can ask for

- **A single number** — count, total, average, ratio over a defined window.
- **A trend** — how a metric has moved over time.
- **A comparison** — one metric across categories, regions, segments, or any dimension.
- **A top / bottom N** — ranked results with a comparable metric.
- **A distribution** — how values are spread across buckets.
- **A follow-up cut** — narrowing or reframing a previous answer.
</script>

  <script type="text/markdown" id="skill-md-doc">---
name: doc
description: Extract text and content from document files (DOCX, DOC, ODT, RTF)
metadata:
  builtin: "true"
---

## What this skill does

Reads document files and returns clean, structured text the agent can reason over. The point is to make the contents of a Word-style document available for summarisation, extraction, and Q&A — without forcing the user to copy/paste anything.

It handles the formats people actually share day to day:

- **DOCX** — modern Microsoft Word
- **DOC** — legacy binary Word
- **ODT** — OpenDocument Text (LibreOffice / OpenOffice)
- **RTF** — Rich Text Format

## When to use

- The user uploads or references a Word, OpenDocument, or RTF file.
- The user wants to summarize a document, extract a specific section, or answer a question about its contents.
- The user wants to convert a document into another format (e.g. plain text, Markdown).

## What you get back

- **Body text** in reading order, with whitespace and paragraph breaks preserved.
- **Headings** with their level intact (H1–H6), so the agent can build a table of contents or navigate by section.
- **Lists** — ordered and unordered — kept as lists.
- **Tables** as Markdown-style tables when the structure is clean, or flattened rows when the layout is irregular.

## Where it stops

- Embedded images are described but not OCR'd — for image-heavy or scanned content, use the **pdf** skill on a PDF export.
- Tracked changes are flattened to the accepted state; the original revision history isn't preserved.
- Comments and footnotes are returned separately from the body, not inline.
- Visual styling (font, color, exact spacing) is dropped — this is about content, not layout.

## What you can ask for

- **A summary** of the whole document or a specific section.
- **A search** for a section, a topic, or every mention of a term.
- **An extraction** of a list, a table, or a defined block (e.g. everything under a heading).
- **A conversion** of the contents into another format (plain text, Markdown).
- **An answer** to a question grounded in what the document actually says.
</script>

  <script type="text/markdown" id="skill-md-generate-report">---
name: generate-report
description: Generate comprehensive data reports with charts and insights
metadata:
  builtin: "true"
---

## What this skill does

Builds a self-contained data report on a topic — narrative, supporting charts, and the underlying numbers — designed to be read end-to-end without the reader having to ask a single follow-up question.

Where **analyze-data** answers one question with one cut and (sometimes) one chart, this skill writes a small document: framed findings, multiple supporting charts, the methods note, and the queries that produced the numbers. The output is something you'd forward to a stakeholder, not a one-line reply in chat.

## When to use

- The user asks for a "report", "summary", "weekly review", or "dashboard-like view" of their data.
- The findings need to be shared with someone who won't run the analysis themselves.
- The answer requires more than a single chart and a paragraph of context.
- The user is closing out an investigation and wants a durable artifact.
- The user wants to explain a trend or a regression to leadership.

## What's in a typical report

- **Executive summary** — 2–3 sentences naming the headline finding up front.
- **Overview** — scope, time window, and the data that's covered.
- **Key metrics** — the numbers that matter, framed as comparisons or deltas, not bare totals.
- **Trends** — three to five charts, each with a one-sentence caption that states the takeaway.
- **Recommendations** — what to do next, grounded in what the data showed.
- **Methods note** — the queries and assumptions, so a curious reader can verify.

## What you can ask for

- **A periodic review** of a metric or area (weekly, monthly, quarterly).
- **A status snapshot** of a topic for a specific audience.
- **A before-and-after analysis** around a known event or change.
- **A multi-dimension breakdown** that frames one metric across several cuts.
- **A wrap-up** that closes out an investigation with findings and recommendations.

## Where it stops

This skill produces a document, not a live dashboard — for an interactive view that updates as data changes, the project's dashboards are the right home. And it builds reports from data already modeled in the project; if a metric isn't in the semantic layer yet, it'll flag the gap rather than guess.
</script>

  <script type="text/markdown" id="skill-md-pdf">---
name: pdf
description: Extract text and tables from PDF files for analysis
metadata:
  builtin: "true"
---

## What this skill does

Pulls usable text and tables out of PDF files so the agent can summarize, search, or answer questions about the contents — without the user retyping anything.

It handles the two flavors of PDFs people actually have:

- **Born-digital PDFs** — exported from Word, Google Docs, design tools — where the text is selectable.
- **Scanned PDFs** — image-only pages where the text has to be recognized first.

## When to use

- The user uploads or references a PDF and wants to extract its text or tables.
- The user wants to summarize, search, or ask questions about a document.
- The user wants to pull figures out of a PDF report into a spreadsheet for further analysis.
- The user has a contract, invoice, research paper, or financial filing they want the agent to reason about.

## What you get back

- **Text in reading order**, with column flow handled and headers/footers separated so they don't pollute the body.
- **Tables** recovered as Markdown tables when the structure is clean; multi-page tables are stitched together.
- **Page-aware extraction** so the agent can answer "what does page 12 say about…" or pull specific page ranges.
- **Metadata** (title, author, page count, creation date) when present.

## Where it stops

- Scanned PDFs run through OCR, and quality depends on the scan — expect occasional character errors on noisy or skewed pages.
- Tables in PDFs are notoriously inconsistent; complex layouts (merged cells, nested headers) may come back as flattened rows that need a second pass.
- Form fields are returned as plain key/value pairs, not as the original interactive widget layout.
- Annotations and comments are extracted separately, not inline with the body.

## What you can ask for

- **A summary** of the document, or of a specific page range.
- **A specific number, fact, or value** pulled out of the file.
- **A table extraction** moved into a spreadsheet for further analysis.
- **A search** across the document for every mention of a topic or term.
- **An answer** to a question grounded in what the PDF says.
</script>

  <script type="text/markdown" id="skill-md-spreadsheet">---
name: spreadsheet
description: Import, transform, and analyze spreadsheet files (CSV, Excel, ODS)
metadata:
  builtin: "true"
---

## What this skill does

Loads a spreadsheet file, surfaces what's in it, and runs the analysis the user asks for — filtering, aggregating, pivoting, joining — without making them move the file into a database first.

It treats spreadsheets as first-class data sources, not just files to be opened, so the same conversational analysis flow that works for modeled warehouse data works for ad-hoc files too.

## Supported formats

- **CSV / TSV** — delimited text, encoding auto-detected
- **XLSX / XLSM** — modern Excel; multi-sheet files are handled, each sheet treated as its own dataset
- **XLS** — legacy Excel
- **ODS** — OpenDocument Spreadsheet (LibreOffice)

## When to use

- The user uploads or references a CSV or Excel file and wants to explore it.
- The user wants to clean, transform, or aggregate spreadsheet data.
- The user wants to join spreadsheet data with the project's modeled (warehouse) data.
- The user has a one-off file they don't want to ingest into the warehouse just to ask one question.

## What you get back

- **Schema overview** — column names, inferred types, row count, sample values, so the user can see what's actually in the file before asking analytical questions.
- **A clean view of the data** — header rows promoted, types coerced, totals/notes rows handled, so the analysis isn't thrown off by stray cells.
- **Aggregations and pivots** — group-by, totals, breakdowns, top-N — described in plain English and run on the spot.
- **Charts** when the result is naturally visual (call into **analyze-data** for the chart layer).
- **Exports** — back to CSV or Markdown for the user to download or paste elsewhere.

## Where it stops

- Excel formulas are read at their last cached value; volatile formulas may be stale.
- Pivot tables and charts inside the source file are read as their underlying data, not their visual form.
- Very large files (hundreds of thousands of rows) work but the agent will sample and filter rather than dump everything inline — for that scale, ingesting into the warehouse is usually the better path.

## What you can ask for

- **A schema overview** — what columns are in the file, their types, and how it looks at a glance.
- **A grouped aggregation** — sum, count, or average a metric by a category.
- **A join** with another file or with the project's modeled data, including a check for missing or unmatched rows.
- **A pivot or reshape** so the layout matches how the user wants to read the data.
- **A clean-up** — promoting headers, fixing types, dropping empty rows.
- **An export** of the result back to CSV or Markdown.
</script>

  <script type="text/markdown" id="skill-md-sql-queries">---
name: sql-queries
description: Write and execute SQL queries to answer data questions
metadata:
  builtin: "true"
---

## What this skill does

Translates a focused data question into SQL, runs it against the connected warehouse through the project's semantic layer, and returns the result alongside the query that produced it.

The two halves matter equally: the user gets the number they asked for, and they get the SQL behind it — so the answer is verifiable, reusable, and doesn't have to be taken on faith.

## When to use

- The user asks a single-shot data question that maps cleanly to one or two tables and a clear aggregation.
- The user wants a number or a small result set right now, not a chart or a written report.
- The user is sketching a query before promoting it into a saved metric, dashboard, or report.
- The user wants to spot-check a number that already lives in a dashboard.
- The user wants the SQL itself, not just the answer — to copy into their own tool, share with a teammate, or save as an approved pattern.

## What you get back

- **The result** — usually a row count, a single value, or a short result table.
- **The exact SQL that ran** — so the next person can verify, edit, or reuse it.
- **Names that match the semantic layer**, not raw warehouse columns — queries reference modeled tables and friendly column names, with joins resolved automatically.
- **Suspicious-result flags** — if the query returns zero rows, exactly one row, or a suspiciously round number, the agent will flag it instead of presenting it as fact.

## Safety

Read-only by default. Writes, deletes, and schema changes (DDL) require explicit approval and are turned off entirely in shared projects unless the role allows them — accidental destructive queries should never be possible from a chat prompt.

## Hand-offs

- Need a chart on top of the result? → **analyze-data**
- Need the answer wrapped in narrative and shared with stakeholders? → **generate-report**
- Want to save this as an approved pattern for the project? → promote it into the project's SQL library so future questions reuse the same shape.

## What you can ask for

- **A count** of records that meet a condition.
- **A total or average** for a specific time window or segment.
- **A top / bottom N** ranking with a comparable metric.
- **A spot-check** on a number from an existing dashboard or report.
- **The SQL itself** — see the query without running it, or get a starting point to edit.
</script>

    function toast(msg, opts) {
      // opts: { kind: 'success' | 'plain', action?: { label, onClick } }
      const o = opts || {};
      const el = document.createElement('div');
      el.className = 'toast fixed top-6 left-1/2 z-[100]';
      el.style.transform = 'translateX(-50%)';
      const iconHtml = o.kind === 'success'
        ? `<span class="inline-flex items-center justify-center w-6 h-6 rounded-full flex-shrink-0" style="background:#22c55e"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>`
        : o.kind === 'warning'
        ? `<span class="inline-flex items-center justify-center w-6 h-6 rounded-full flex-shrink-0" style="background:#F59E0B"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="6" x2="12" y2="13"/><line x1="12" y1="17" x2="12" y2="17"/></svg></span>`
        : '';
      const actionHtml = o.action
        ? `<button class="toast-action" style="color:#2F54EB;font-weight:500;cursor:pointer;padding:0 4px">${o.action.label}</button>`
        : '';
      el.innerHTML = `
        <div style="background:#ffffff;color:#1a1a1a;padding:12px 18px;border-radius:12px;display:inline-flex;align-items:center;gap:12px;box-shadow:0 10px 28px rgba(0,0,0,.12),0 2px 6px rgba(0,0,0,.06);font-size:14px;font-weight:500">
          ${iconHtml}
          <span>${msg}</span>
          ${actionHtml}
        </div>
      `;
      if (o.action) {
        el.querySelector('.toast-action').addEventListener('click', () => { o.action.onClick(); el.remove(); });
      }
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1500);
    }
    function renderCodeLines(content) {
      return content.split('\n').map((line, i) => `<div class="code-line"><span class="ln">${i+1}</span><span class="ct">${escapeHtml(line) || '&nbsp;'}</span></div>`).join('');

    // ----------------------------- Handlers -----------------------------
    function attachHandlers() {
      $app.querySelectorAll('[data-search]').forEach(el => {
        el.addEventListener('input', e => {
          state.search = e.target.value;
          const start = e.target.selectionStart;
          render();
          const next = $app.querySelector('[data-search]');
          if (next) { next.focus(); next.setSelectionRange(start, start); }
        });
      });

      $app.querySelectorAll('[data-action]').forEach(el => {
        el.addEventListener('click', e => handleAction(el.dataset.action, el.dataset.id, e, el));
      });

      const dz = $app.querySelector('[data-dropzone]');
      const fi = $app.querySelector('[data-file]');
      if (dz && fi) {
        dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
        dz.addEventListener('dragleave', () => dz.classList.remove('over'));
        dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); const f = e.dataTransfer.files[0]; if (f) handleUploadedFile(f); });
        fi.addEventListener('change', e => { const f = e.target.files[0]; if (f) handleUploadedFile(f); });
      }

    }

    function handleAction(action, id, e, el) {
      switch (action) {
        case 'toggle': {
          const s = state.skills.find(x => x.id === id);
          if (s) {
            s.enabled = !s.enabled;
            render();
            if (!s.enabled) toast(`Disabled ${s.name} for this project`, { kind: 'warning' });
            else toast(`Enabled ${s.name} for this project`, { kind: 'success' });
          }
          break;
        }
        case 'toggle-menu': { e.stopPropagation(); setState({ openMenuId: state.openMenuId === id ? null : id }); break; }
        case 'open-detail': { setState({ modal: { type: 'detail', id }, selectedFileIdx: 0, openMenuId: null, folderCollapsed: false }); break; }
        case 'toggle-folder': {
          state.folderCollapsed = !state.folderCollapsed;
          const tree = $app.querySelector('[data-folder-tree]');
          if (tree) tree.classList.toggle('collapsed', state.folderCollapsed);
          break;
        }
        case 'open-upload': { setState({ modal: { type: 'upload' }, uploadError: null, openMenuId: null }); break; }
        case 'select-file': {
          const idx = parseInt(el.dataset.idx, 10);
          state.selectedFileIdx = idx;
          $app.querySelectorAll('[data-folder-tree] .ft-file').forEach((f, i) => f.classList.toggle('active', i === idx));
          const skill = state.skills.find(x => x.id === state.modal?.id);
          const file = skill?.files?.[idx];
          const viewer = $app.querySelector('.code-viewer');
          if (viewer && file) viewer.innerHTML = renderCodeLines(file.content);
          break;
        }
        case 'clear-search': { setState({ search: '' }); break; }
        case 'toggle-sidebar': { e.stopPropagation(); setState({ sidebarOpen: !state.sidebarOpen }); break; }
        case 'close-sidebar': { setState({ sidebarOpen: false }); break; }
        case 'close-modal': {
          if (e && e.currentTarget && e.currentTarget.matches('[data-modal-backdrop]')) {
            if (e.target.closest('[data-modal-content]')) return;
          }
          setState({ modal: null, uploadingFile: null });
          break;
        }
        case 'menu-try':
        case 'try-skill': {
          const s = state.skills.find(x => x.id === id);
          setState({ view: 'thread', threadMessage: `Demo /${s.name} with some great examples`, openMenuId: null, modal: null });
          break;
        }
        case 'back-to-skills': { setState({ view: 'skills', threadMessage: null }); break; }
        case 'menu-download':
        case 'download-skill': { const s = state.skills.find(x => x.id === id); downloadFakeZip(s.name); toast(`Downloaded ${s.name}.zip`, { kind: 'success' }); setState({ openMenuId: null }); break; }
        case 'dismiss-upload-error': { setState({ uploadError: null }); break; }
        case 'apply-replace': {
          const err = state.uploadError;
          if (err && err.type === 'duplicate' && err.payload) {
            const i = state.skills.findIndex(s => s.name === err.payload.name);
            if (i >= 0) state.skills[i] = err.payload;
            const name = err.payload.name;
            state.uploadError = null;
            state.modal = null;
            render();
            toast(`Replaced "${name}"`, { kind: 'success', action: { label: 'Try in Chat', onClick: () => {} } });
          }
          break;
        }
        case 'menu-edit': {
          const s = state.skills.find(x => x.id === id);
          setState({ view: 'thread', threadMessage: `Help me edit this skill /${s.name}`, openMenuId: null, modal: null });
          break;
        }
        case 'menu-delete': { setState({ modal: { type: 'delete', id }, openMenuId: null }); break; }
        case 'confirm-delete': { state.skills = state.skills.filter(s => s.id !== id); toast('Skill deleted'); setState({ modal: null }); break; }
        case 'confirm-replace': {
          const payload = state.modal?.payload;
          if (payload) {
            const i = state.skills.findIndex(s => s.name === payload.name);
            if (i >= 0) state.skills[i] = payload; else state.skills.unshift(payload);
            const name = payload.name;
            state.modal = null;
            render();
            toast(`Replaced ${name}`, { kind: 'success', action: { label: 'Try in Chat', onClick: () => {} } });
          } else {
            setState({ modal: null });
          }
          break;
        }
      }
    }

    // Fake progress animation for real user-driven uploads, mirrors the
    // orchestrator's animateUploadProgress but without the play-token guard.
    async function fakeUploadProgress(fileName, durationMs) {
      state.uploadingFile = { name: fileName, progress: 0 };
      state.uploadError = null;
      render();
      const steps = 28;
      const stepDur = durationMs / steps;
      for (let i = 1; i <= steps; i++) {
        await new Promise(r => setTimeout(r, stepDur));
        // bail if the modal was closed mid-upload
        if (!state.uploadingFile) return false;
        state.uploadingFile.progress = Math.round((i / steps) * 100);
        const fill = document.querySelector('[data-upload-progress-fill]');
        const pct = document.querySelector('[data-upload-progress-pct]');
        if (fill) fill.style.width = state.uploadingFile.progress + '%';
        if (pct) pct.textContent = state.uploadingFile.progress + '%';
      }
      return true;
    }

    async function handleUploadedFile(file) {
      const rawName = file.name.replace(/\.zip$/i, '');
      const name = rawName || 'new-skill';

      // Simulate "SKILL.md not found" when filename hints at a malformed zip.
      // Errors short-circuit the progress animation, just like a real upload that
      // fails validation immediately.
      if (/no-skill|invalid|bad|missing|broken/i.test(file.name) || file.size === 0) {
        setState({ uploadError: { type: 'invalid', message: 'SKILL.md not found in zip file' }, uploadingFile: null });
        return;
      }

      // Run the fake progress UI before applying the real state change.
      const completed = await fakeUploadProgress(file.name, 2200);
      if (!completed) return;

      const exists = state.skills.some(s => s.name === name);
      const newSkill = {
        id: name + '-' + Date.now(), name,
        description: 'Uploaded skill — description from SKILL.md will appear here.',
        official: false, enabled: true,
        updatedAt: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }),
        updatedBy: 'Iris H',
        files: [{ path: `${name}/SKILL.md`, content: `---\nname: ${name}\ndescription: Uploaded skill\n---\n\n# ${name}\n` }],
      };
      state.uploadingFile = null;
      if (exists) {
        const existing = state.skills.find(s => s.name === name);
        newSkill.id = existing.id;
        setState({ modal: { type: 'replace', name, payload: newSkill } });
      } else {
        state.skills.unshift(newSkill);
        state.modal = null;
        state.uploadError = null;
        render();
        toast(`Uploaded ${name}`, { kind: 'success', action: { label: 'Try in Chat', onClick: () => {} } });
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && state.modal) setState({ modal: null });
      else if (e.key === 'Escape' && state.openMenuId) setState({ openMenuId: null });
    });

    document.addEventListener('click', (e) => {
      if (!state.openMenuId) return;
      if (e.target.closest('[data-action="toggle-menu"]')) return;
      if (e.target.closest('.dd-menu')) return;
      setState({ openMenuId: null });
    });

    render();

    // =============== Step-based playback orchestrator ===============
    // Each journey is a list of atomic steps. Each step has a label
    // (shown in the parent control panel) and a run() that drives the
    // prototype's state. The parent kicks off playback via postMessage.

    // Snapshot seed skills so each replay starts from the same baseline.
    const SEED_SKILLS = JSON.parse(JSON.stringify(state.skills));

    let playCtl = { token: 0 };
    function cancelPlay() { playCtl.token++; }
    function newToken() { return ++playCtl.token; }
    const wait = (ms) => new Promise(r => setTimeout(r, ms));
    const alive = (t) => t === playCtl.token;

    function resetState({ withUserSkill = true } = {}) {
      state.skills = JSON.parse(JSON.stringify(SEED_SKILLS));
      if (!withUserSkill) state.skills = state.skills.filter(s => s.official);
      state.search = '';
      state.openMenuId = null;
      state.selectedFileIdx = 0;
      state.modal = null;
      state.uploadError = null;
      state.uploadingFile = null;
      state.view = 'skills';
      state.threadMessage = null;
      state.folderCollapsed = false;
      render();
    }

    // Build a "fresh-upload" payload matching the seed user skill.
    function makeUploadPayload(seed) {
      const p = JSON.parse(JSON.stringify(seed));
      p.id = seed.id + '-' + Date.now();
      p.updatedAt = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      return p;
    }

    // Animate a progress bar from 0 → 100 in the upload modal.
    async function animateUploadProgress(t, fileName, durationMs = 1400) {
      state.uploadingFile = { name: fileName, progress: 0 };
      render();
      const steps = 24;
      const stepDur = durationMs / steps;
      for (let i = 1; i <= steps; i++) {
        await wait(stepDur); if (!alive(t)) return false;
        state.uploadingFile.progress = Math.round((i / steps) * 100);
        // Patch only the progress fill node to avoid re-rendering the whole modal mid-stream
        const fill = document.querySelector('[data-upload-progress-fill]');
        const pct = document.querySelector('[data-upload-progress-pct]');
        if (fill) fill.style.width = state.uploadingFile.progress + '%';
        if (pct) pct.textContent = state.uploadingFile.progress + '%';
      }
      return true;
    }

    // ---------- UPLOAD JOURNEY ----------
    const uploadSteps = [
      { label: 'Open the Upload skill modal',
        run: async (t) => {
          setState({ modal: { type: 'upload' }, uploadError: null, uploadingFile: null });
          await wait(700);
        }},
      { label: 'Drag wren-data-explorer.zip into the dropzone',
        run: async (t) => {
          // visually arm the dropzone, then trigger the progress animation
          const dz = document.querySelector('[data-dropzone]');
          if (dz) dz.classList.add('over');
          await wait(450); if (!alive(t)) return;
          if (dz) dz.classList.remove('over');
          await animateUploadProgress(t, 'wren-data-explorer.zip', 2800);
        }},
      { label: 'Skill appears at the top of the list',
        run: async (t) => {
          const seedUser = SEED_SKILLS.find(s => !s.official);
          const newSkill = makeUploadPayload(seedUser);
          state.skills.unshift(newSkill);
          state.modal = null;
          state.uploadingFile = null;
          render();
          toast('Uploaded ' + newSkill.name, { kind: 'success', action: { label: 'Try in Chat', onClick: () => {} } });
          await wait(1400);
        }},
      { label: 'Try uploading the same skill again',
        run: async (t) => {
          setState({ modal: { type: 'upload' }, uploadError: null, uploadingFile: null });
          await wait(900);
          const dz = document.querySelector('[data-dropzone]');
          if (dz) dz.classList.add('over');
          await wait(450); if (!alive(t)) return;
          if (dz) dz.classList.remove('over');
          await animateUploadProgress(t, 'wren-data-explorer.zip', 1100);
        }},
      { label: 'Duplicate name detected → Replace modal',
        run: async (t) => {
          const seedUser = SEED_SKILLS.find(s => !s.official);
          const payload = makeUploadPayload(seedUser);
          state.uploadingFile = null;
          setState({ modal: { type: 'replace', name: seedUser.name, payload } });
          await wait(1800);
        }},
      { label: 'Confirm Upload and replace',
        run: async (t) => {
          const payload = state.modal && state.modal.payload;
          if (payload) {
            const i = state.skills.findIndex(s => s.name === payload.name);
            if (i >= 0) state.skills[i] = payload; else state.skills.unshift(payload);
            toast('Replaced ' + payload.name, { kind: 'success' });
          }
          setState({ modal: null });
          await wait(900);
        }},
    ];

    // ---------- TRY-IT-OUT JOURNEY ----------
    const trySteps = [
      { label: 'Click into the wren-data-explorer row',
        run: async (t) => {
          resetState();
          await wait(500);
          setState({ modal: { type: 'detail', id: 'wren-data-explorer' }, selectedFileIdx: 0 });
          await wait(1200);
        }},
      { label: 'Inspect the SKILL.md in the two-pane code view',
        run: async (t) => {
          await wait(1400);
        }},
      { label: 'Click "Try it out" in the modal footer',
        run: async (t) => {
          const s = state.skills.find(x => x.id === 'wren-data-explorer');
          if (!s) return;
          setState({ view: 'thread', threadMessage: 'Demo /' + s.name + ' with some great examples', openMenuId: null, modal: null });
          await wait(1000);
        }},
    ];

    const JOURNEYS_DEF = {
      upload: { steps: uploadSteps, init: () => resetState({ withUserSkill: false }) },
      try:    { steps: trySteps,    init: () => resetState({ withUserSkill: true  }) },
    };

    function postToParent(msg) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(msg, '*');
      }
    }

    async function playJourney(journeyId) {
      cancelPlay();
      const t = newToken();
      const def = JOURNEYS_DEF[journeyId];
      if (!def) return;
      def.init && def.init();
      await wait(400); if (!alive(t)) { postToParent({ type: 'jc_play_aborted' }); return; }
      for (let i = 0; i < def.steps.length; i++) {
        if (!alive(t)) { postToParent({ type: 'jc_play_aborted' }); return; }
        postToParent({ type: 'jc_step_start', idx: i });
        try { await def.steps[i].run(t); } catch (err) { console.error(err); }
        if (!alive(t)) { postToParent({ type: 'jc_play_aborted' }); return; }
        postToParent({ type: 'jc_step_done', idx: i });
        await wait(250);
      }
      postToParent({ type: 'jc_play_done' });
    }

    // ---------- postMessage protocol ----------
    window.addEventListener('message', (e) => {
      const d = e.data;
      if (!d || typeof d !== 'object' || !d.type) return;
      if (d.type === 'jc_play')   playJourney(d.journey);
      else if (d.type === 'jc_cancel') { cancelPlay(); postToParent({ type: 'jc_play_aborted' }); }
      else if (d.type === 'jc_reset')  { cancelPlay(); JOURNEYS_DEF[d.journey] && JOURNEYS_DEF[d.journey].init(); }
    });

    // Announce ready + send step labels so the parent can render them.
    function announceReady() {
      const steps = Object.fromEntries(Object.entries(JOURNEYS_DEF).map(([k, v]) => [k, v.steps.map(s => s.label)]));
      postToParent({ type: 'jc_ready', steps });
    }
    announceReady();
    // Re-announce after a beat in case the parent script attached its listener later.
    setTimeout(announceReady, 300);
  </script>
</body>
</html>
